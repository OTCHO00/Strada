<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <title>Strada</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.18.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.18.0/mapbox-gl.js"></script>

    <style>

        body { margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
    </style>
</head>

<body>

    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.min.js"></script>
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.1.0/mapbox-gl-geocoder.css" type="text/css">

    <div id="map"></div>

    <script>

    mapboxgl.accessToken = 'pk.eyJ1Ijoib3RjaG8iLCJhIjoiY21rbHgyczY3MGJmaTNkc2JscXE5NG1wMyJ9.z77Uh_KJ_BJ3WsKKmkrgMQ';
    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/standard'
    });

   map.addControl(
        new MapboxGeocoder({
            accessToken: mapboxgl.accessToken,
            useBrowserFocus: true,
            mapboxgl: mapboxgl
        })
    );

    map.on('style.load', function() {
        map.on('click', function(e) {
            var coordinates = e.lngLat;
            const marker = new mapboxgl.Marker({color: "black"})
            .setLngLat(coordinates)
            .addTo(map);
        });
    });

    </script>

</body>
</html>
